name: Update releases from Yandex Music

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch releases
        run: |
          python --version
          ls -la scripts/
          python scripts/update_releases.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/releases.json
          if git diff --staged --quiet; then
            echo "No changes in releases.json"
          else
            git commit -m "chore: auto-update releases from Yandex Music"
            git push
          fi
